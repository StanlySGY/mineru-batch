# MinerU Batch 部署配置
# ──────────────────────────────────────────────
# 更新版本时只需修改 VERSION 文件，docker-build.sh 会写入 .env 的 TAG。
# ──────────────────────────────────────────────
#
# 切换 PostgreSQL：取消下方注释，注释掉 app 中的 DATABASE_URL
#   postgres:
#     image: postgres:16-alpine
#     environment:
#       POSTGRES_DB: mineru
#       POSTGRES_USER: mineru
#       POSTGRES_PASSWORD: mineru_pass
#     volumes:
#       - pgdata:/var/lib/postgresql/data
#     restart: unless-stopped

services:
  app:
    image: mineru-batch:${TAG:-v0.1.0}
    ports:
      - "${APP_PORT:-8900}:8900"
    volumes:
      - data:/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - ALLOW_PRIVATE_ENDPOINTS=${ALLOW_PRIVATE_ENDPOINTS:-true}
      # PostgreSQL 示例（取消注释启用）:
      # - DATABASE_URL=postgresql://mineru:mineru_pass@postgres:5432/mineru
    restart: unless-stopped

volumes:
  data:
  # pgdata:
